<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>CodeQuest</title>
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        src: url('/assets/game/fonts/PressStart2P.ttf') format('truetype');
        font-display: block;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0d1a;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* Pin the game inside the device safe area so a notch or rounded corners can't
         clip the canvas edges (viewport-fit=cover makes the insets readable; on a
         laptop / non-notched screen they're 0, so it's just a full-window box). */
      #game {
        position: fixed;
        top: env(safe-area-inset-top, 0px);
        left: env(safe-area-inset-left, 0px);
        right: env(safe-area-inset-right, 0px);
        bottom: env(safe-area-inset-bottom, 0px);
      }
      #game canvas { display: block; image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
