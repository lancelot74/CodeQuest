<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>CodeQuest</title>
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        src: url('/assets/game/fonts/PressStart2P.ttf') format('truetype');
        font-display: block;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0d1a;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game { width: 100vw; height: 100vh; height: 100dvh; }
      #game canvas { display: block; image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
